# ============================================================================
# ORION Architekt-AT - GitHub Actions CI/CD Pipeline
# ============================================================================
# Automated testing, building, and deployment pipeline
# Author: ORION Engineering Team
# Date: 2026-04-11
# Status: PRODUCTION READY
# ============================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  release:
    types: [published]

env:
  PYTHON_VERSION: "3.11"
  DOCKER_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ==========================================================================
  # Code Quality & Security Checks
  # ==========================================================================
  quality:
    name: Code Quality & Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install black flake8 mypy bandit safety

      - name: Run Black (code formatting)
        run: black --check .

      - name: Run Flake8 (linting)
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run MyPy (type checking)
        run: mypy api/ --ignore-missing-imports

      - name: Run Bandit (security)
        run: bandit -r api/ -ll

      - name: Run Safety (dependency check)
        run: safety check --json || true

  # ==========================================================================
  # Unit Tests
  # ==========================================================================
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test_secret_key_for_testing_only
          JWT_SECRET_KEY: test_jwt_secret_key_for_testing_only
        run: |
          pytest tests/ \
            --cov=api \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

  # ==========================================================================
  # Integration Tests
  # ==========================================================================
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [quality, test]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Start services with Docker Compose
        env:
          POSTGRES_PASSWORD: test_postgres_password
          REDIS_PASSWORD: test_redis_password
          SECRET_KEY: test_secret_key_for_ci_testing_only_not_production
          JWT_SECRET_KEY: test_jwt_secret_key_for_ci_testing_only_not_production
          GRAFANA_ADMIN_PASSWORD: test_grafana_password
        run: |
          docker compose -f docker-compose.production.yml up -d
          sleep 30  # Wait for services to be ready

      - name: Run integration tests
        if: hashFiles('tests/test_integration.py') != ''
        run: |
          pip install pytest httpx
          pytest tests/test_integration.py -v

      - name: Stop services
        if: always()
        env:
          POSTGRES_PASSWORD: test_postgres_password
          REDIS_PASSWORD: test_redis_password
          SECRET_KEY: test_secret_key_for_ci_testing_only_not_production
          JWT_SECRET_KEY: test_jwt_secret_key_for_ci_testing_only_not_production
          GRAFANA_ADMIN_PASSWORD: test_grafana_password
        run: docker compose -f docker-compose.production.yml down

  # ==========================================================================
  # Build Docker Image
  # ==========================================================================
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [quality, test]
    if: github.event_name == 'push' || github.event_name == 'release'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==========================================================================
  # Deploy to Staging
  # ==========================================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://staging.orion-architekt.at

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Staging Kubernetes
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG_STAGING }}
        run: |
          echo "$KUBE_CONFIG" | base64 -d > kubeconfig
          kubectl --kubeconfig=kubeconfig apply -f k8s/deployment.yaml
          kubectl --kubeconfig=kubeconfig rollout status deployment/orion-api -n orion-staging

  # ==========================================================================
  # Deploy to Production
  # ==========================================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'release'
    environment:
      name: production
      url: https://api.orion-architekt.at

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Production Kubernetes
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG_PRODUCTION }}
        run: |
          echo "$KUBE_CONFIG" | base64 -d > kubeconfig
          kubectl --kubeconfig=kubeconfig apply -f k8s/deployment.yaml
          kubectl --kubeconfig=kubeconfig rollout status deployment/orion-api -n orion-production

      - name: Verify Deployment
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG_PRODUCTION }}
        run: |
          kubectl --kubeconfig=kubeconfig get pods -n orion-production
          kubectl --kubeconfig=kubeconfig get svc -n orion-production

      - name: Run Smoke Tests
        run: |
          sleep 30
          curl -f https://api.orion-architekt.at/health || exit 1
          echo "✅ Production deployment successful"

  # ==========================================================================
  # Security Scan
  # ==========================================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          format: "sarif"
          output: "trivy-results.sarif"

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-results.sarif"
