# ============================================================================
# ORION Architekt-AT - DAST Security Scanning
# ============================================================================
# Dynamic Application Security Testing using OWASP ZAP
# Scans running application for runtime vulnerabilities
# Author: ORION Engineering Team
# Date: 2026-04-12
# Status: PRODUCTION SECURITY
# ============================================================================

name: DAST Security Scan

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ==========================================================================
  # OWASP ZAP Baseline Scan
  # ==========================================================================
  zap-baseline:
    name: ZAP Baseline Scan
    runs-on: ubuntu-latest
    permissions:
      issues: write
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start application with Docker Compose
        env:
          POSTGRES_PASSWORD: test_postgres_password
          REDIS_PASSWORD: test_redis_password
          SECRET_KEY: test_secret_key_for_ci_testing_only_not_production
          JWT_SECRET_KEY: test_jwt_secret_key_for_ci_testing_only_not_production
          GRAFANA_ADMIN_PASSWORD: test_grafana_password
        run: |
          docker compose -f docker-compose.production.yml up -d
          sleep 45  # Wait for services to be fully ready

      - name: Verify application is running
        env:
          POSTGRES_PASSWORD: test_postgres_password
          REDIS_PASSWORD: test_redis_password
          SECRET_KEY: test_secret_key_for_ci_testing_only_not_production
          JWT_SECRET_KEY: test_jwt_secret_key_for_ci_testing_only_not_production
          GRAFANA_ADMIN_PASSWORD: test_grafana_password
        run: |
          curl -f http://localhost/health || (docker compose -f docker-compose.production.yml logs && exit 1)

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.10.0
        with:
          target: 'http://localhost'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a -j -l WARN -T 60'
          fail_action: false  # Don't fail build, just report
          allow_issue_writing: true

      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-baseline-report
          path: |
            report_html.html
            report_json.json
            report_md.md

      - name: Stop services
        if: always()
        env:
          POSTGRES_PASSWORD: test_postgres_password
          REDIS_PASSWORD: test_redis_password
          SECRET_KEY: test_secret_key_for_ci_testing_only_not_production
          JWT_SECRET_KEY: test_jwt_secret_key_for_ci_testing_only_not_production
          GRAFANA_ADMIN_PASSWORD: test_grafana_password
        run: docker compose -f docker-compose.production.yml down

  # ==========================================================================
  # OWASP ZAP Full Scan (Weekly)
  # ==========================================================================
  zap-full-scan:
    name: ZAP Full Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      issues: write
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start application
        env:
          POSTGRES_PASSWORD: test_postgres_password
          REDIS_PASSWORD: test_redis_password
          SECRET_KEY: test_secret_key_for_ci_testing_only_not_production
          JWT_SECRET_KEY: test_jwt_secret_key_for_ci_testing_only_not_production
          GRAFANA_ADMIN_PASSWORD: test_grafana_password
        run: |
          docker compose -f docker-compose.production.yml up -d
          sleep 45

      - name: ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.10.0
        with:
          target: 'http://localhost'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a -j -l WARN'
          fail_action: false
          allow_issue_writing: true

      - name: Upload ZAP Full Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-full-scan-report
          path: |
            report_html.html
            report_json.json
            report_md.md

      - name: Stop services
        if: always()
        env:
          POSTGRES_PASSWORD: test_postgres_password
          REDIS_PASSWORD: test_redis_password
          SECRET_KEY: test_secret_key_for_ci_testing_only_not_production
          JWT_SECRET_KEY: test_jwt_secret_key_for_ci_testing_only_not_production
          GRAFANA_ADMIN_PASSWORD: test_grafana_password
        run: docker compose -f docker-compose.production.yml down

  # ==========================================================================
  # API Security Testing (OWASP API Top 10)
  # ==========================================================================
  api-security-test:
    name: API Security Testing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Start services
        env:
          POSTGRES_PASSWORD: test_postgres_password
          REDIS_PASSWORD: test_redis_password
          SECRET_KEY: test_secret_key_for_ci_testing_only_not_production
          JWT_SECRET_KEY: test_jwt_secret_key_for_ci_testing_only_not_production
          GRAFANA_ADMIN_PASSWORD: test_grafana_password
        run: |
          docker compose -f docker-compose.production.yml up -d
          sleep 45

      - name: Run API Security Tests
        env:
          TEST_API_URL: http://localhost
        run: |
          pytest tests/test_api_security_owasp.py -v --tb=short || true

      - name: Stop services
        if: always()
        env:
          POSTGRES_PASSWORD: test_postgres_password
          REDIS_PASSWORD: test_redis_password
          SECRET_KEY: test_secret_key_for_ci_testing_only_not_production
          JWT_SECRET_KEY: test_jwt_secret_key_for_ci_testing_only_not_production
          GRAFANA_ADMIN_PASSWORD: test_grafana_password
        run: docker compose -f docker-compose.production.yml down

  # ==========================================================================
  # Secrets Scanning
  # ==========================================================================
  secrets-scan:
    name: Secrets Scanning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for secret scanning

      - name: Check if there are new commits to scan
        id: check-commits
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            BEFORE="${{ github.event.before }}"
            if [ "$BEFORE" = "0000000000000000000000000000000000000000" ] || [ "$BEFORE" = "${{ github.sha }}" ]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
            else
              echo "skip=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: TruffleHog Secrets Scan
        if: steps.check-commits.outputs.skip != 'true'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event_name == 'push' && github.event.before || github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  # ==========================================================================
  # Dependency Vulnerability Scan
  # ==========================================================================
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Safety
        run: pip install safety

      - name: Run Safety Check
        run: |
          safety check --json --output safety-report.json || true
          safety check || true

      - name: Upload Safety Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: safety-report
          path: safety-report.json

  # ==========================================================================
  # Container Security Scan (Additional)
  # ==========================================================================
  container-scan:
    name: Advanced Container Scanning
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f Dockerfile.production -t orion-test:latest .

      - name: Run Grype Scan
        uses: anchore/scan-action@v3
        with:
          image: orion-test:latest
          fail-build: false
          severity-cutoff: high

      - name: Upload Grype Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: grype-report
          path: |
            anchore-reports/*
