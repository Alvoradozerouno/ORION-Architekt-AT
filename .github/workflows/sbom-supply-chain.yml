# ============================================================================
# ORION Architekt-AT - CI/CD Pipeline with SBOM Generation
# ============================================================================
# Enhanced security with Software Bill of Materials
# Author: ORION Engineering Team
# Date: 2026-04-12
# Status: PRODUCTION SECURITY
# ============================================================================

name: SBOM Generation and Supply Chain Security

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  release:
    types: [published]
  schedule:
    # Weekly scan on Sunday at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ==========================================================================
  # Generate SBOM (Software Bill of Materials)
  # ==========================================================================
  generate-sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # CycloneDX SBOM for Python dependencies
      - name: Generate Python SBOM (CycloneDX)
        run: |
          pip install cyclonedx-bom
          cyclonedx-py requirements requirements.txt \
            --of JSON \
            -o sbom-python-cyclonedx.json

      # Syft SBOM for comprehensive analysis
      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0.15.0
        with:
          path: .
          artifact-name: sbom-syft.spdx.json
          output-file: sbom-syft.spdx.json
          format: spdx-json

      # Generate SBOM for Docker image
      - name: Build Docker image
        run: docker build -f Dockerfile.production -t orion-test:latest .

      - name: Generate Docker SBOM with Syft
        uses: anchore/sbom-action@v0.15.0
        with:
          image: orion-test:latest
          artifact-name: sbom-docker.spdx.json
          output-file: sbom-docker.spdx.json
          format: spdx-json

      # Upload SBOMs as artifacts
      - name: Upload Python SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-python-cyclonedx
          path: sbom-python-cyclonedx.json
          retention-days: 90

      - name: Upload Syft SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-syft
          path: sbom-syft.spdx.json
          retention-days: 90

      - name: Upload Docker SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-docker
          path: sbom-docker.spdx.json
          retention-days: 90

      # Attach SBOM to release
      - name: Attach SBOM to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            sbom-python-cyclonedx.json
            sbom-syft.spdx.json
            sbom-docker.spdx.json

  # ==========================================================================
  # Vulnerability Scanning with SBOM
  # ==========================================================================
  sbom-vulnerability-scan:
    name: SBOM Vulnerability Scan
    runs-on: ubuntu-latest
    needs: generate-sbom

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download SBOM
        uses: actions/download-artifact@v4
        with:
          name: sbom-syft
          path: .

      # Scan SBOM with Grype
      - name: Scan SBOM for vulnerabilities
        uses: anchore/scan-action@v3
        with:
          sbom: sbom-syft.spdx.json
          fail-build: false
          severity-cutoff: high
          output-format: sarif

      - name: Upload vulnerability scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif

  # ==========================================================================
  # License Compliance Check
  # ==========================================================================
  license-compliance:
    name: License Compliance Check
    runs-on: ubuntu-latest
    needs: generate-sbom

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download SBOM
        uses: actions/download-artifact@v4
        with:
          name: sbom-python-cyclonedx
          path: .

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install license checker
        run: |
          pip install pip-licenses licensecheck

      - name: Check licenses
        run: |
          echo "=== Analyzing Python Package Licenses ==="
          pip-licenses --format=markdown --output-file=licenses.md

          echo ""
          echo "=== Checking for non-permissive licenses ==="
          pip-licenses --fail-on "GPL-2.0;GPL-3.0;LGPL-2.0;LGPL-2.1;LGPL-3.0;AGPL-3.0"

      - name: Upload license report
        uses: actions/upload-artifact@v4
        with:
          name: license-report
          path: licenses.md

  # ==========================================================================
  # Dependency Review (PR only)
  # ==========================================================================
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
          deny-licenses: GPL-2.0, GPL-3.0, LGPL-2.0, LGPL-3.0, AGPL-3.0
          comment-summary-in-pr: always

  # ==========================================================================
  # Supply Chain Provenance (SLSA)
  # ==========================================================================
  generate-provenance:
    name: Generate SLSA Provenance
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f Dockerfile.production -t orion:${{ github.ref_name }} .

      - name: Generate provenance
        uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.1.0
        with:
          image: orion
          digest: ${{ steps.build.outputs.digest }}

  # ==========================================================================
  # Dependency Update Check
  # ==========================================================================
  check-outdated:
    name: Check Outdated Dependencies
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-check

      - name: Check for outdated packages
        run: |
          echo "=== Checking for outdated packages ==="
          pip list --outdated --format=columns > outdated.txt
          cat outdated.txt

          echo ""
          echo "=== Security vulnerabilities ==="
          pip-audit --format json --output pip-audit-report.json || true
          cat pip-audit-report.json

      - name: Upload outdated report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-reports
          path: |
            outdated.txt
            pip-audit-report.json

      - name: Create issue if vulnerabilities found
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Security vulnerabilities found in dependencies',
              body: 'Automated scan found security vulnerabilities. Check the workflow run for details.',
              labels: ['security', 'dependencies']
            })
