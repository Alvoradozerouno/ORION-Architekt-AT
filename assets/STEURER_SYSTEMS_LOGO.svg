<!--
  STEURER SYSTEMS Logo
  Professional Digital Art für Austrian Building Regulations Platform

  Design-Konzept:
  - Österreich-Flagge Farben (Rot-Weiß-Rot)
  - Bauarchitektur-Symbolik (geometrische Präzision)
  - System-Integration (vernetzte Elemente)
  - Modern, Professional, Global Leading
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <!-- Österreich Farben -->
    <linearGradient id="austrianRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ED2939;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C8102E;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="techGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1E3A8A;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60A5FA;stop-opacity:1" />
    </linearGradient>

    <!-- Shadow Filter -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="2" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#0F172A"/>

  <!-- Austrian Flag Inspired Stripes (subtle background) -->
  <rect x="0" y="0" width="800" height="80" fill="#ED2939" opacity="0.1"/>
  <rect x="0" y="160" width="800" height="80" fill="#ED2939" opacity="0.1"/>
  <rect x="0" y="320" width="800" height="80" fill="#ED2939" opacity="0.1"/>

  <!-- Building/Architecture Grid Symbol (Left) -->
  <g transform="translate(80, 100)" filter="url(#shadow)">
    <!-- Main Building Structure -->
    <rect x="0" y="60" width="60" height="140" fill="url(#austrianRed)" rx="4"/>
    <rect x="70" y="30" width="60" height="170" fill="url(#techGradient)" rx="4"/>
    <rect x="140" y="80" width="60" height="120" fill="url(#austrianRed)" rx="4"/>

    <!-- Windows/Grid Pattern -->
    <g opacity="0.3" stroke="#FFFFFF" stroke-width="2" fill="none">
      <line x1="20" y1="80" x2="20" y2="180"/>
      <line x1="40" y1="80" x2="40" y2="180"/>
      <line x1="5" y1="100" x2="55" y2="100"/>
      <line x1="5" y1="140" x2="55" y2="140"/>
      <line x1="5" y1="180" x2="55" y2="180"/>

      <line x1="90" y1="50" x2="90" y2="180"/>
      <line x1="110" y1="50" x2="110" y2="180"/>
      <line x1="75" y1="70" x2="125" y2="70"/>
      <line x1="75" y1="110" x2="125" y2="110"/>
      <line x1="75" y1="150" x2="125" y2="150"/>

      <line x1="160" y1="100" x2="160" y2="180"/>
      <line x1="180" y1="100" x2="180" y2="180"/>
      <line x1="145" y1="120" x2="195" y2="120"/>
      <line x1="145" y1="160" x2="195" y2="160"/>
    </g>

    <!-- Foundation Line -->
    <line x1="-10" y1="200" x2="210" y2="200" stroke="url(#austrianRed)" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- System Integration Symbol (Connected Nodes) -->
  <g transform="translate(350, 150)" opacity="0.6">
    <circle cx="0" cy="0" r="6" fill="#3B82F6"/>
    <circle cx="80" cy="-20" r="6" fill="#60A5FA"/>
    <circle cx="80" cy="20" r="6" fill="#60A5FA"/>
    <circle cx="160" cy="0" r="6" fill="#3B82F6"/>

    <line x1="0" y1="0" x2="80" y2="-20" stroke="#3B82F6" stroke-width="2" opacity="0.5"/>
    <line x1="0" y1="0" x2="80" y2="20" stroke="#3B82F6" stroke-width="2" opacity="0.5"/>
    <line x1="80" y1="-20" x2="160" y2="0" stroke="#3B82F6" stroke-width="2" opacity="0.5"/>
    <line x1="80" y1="20" x2="160" y2="0" stroke="#3B82F6" stroke-width="2" opacity="0.5"/>
  </g>

  <!-- Main Text: STEURER SYSTEMS -->
  <g transform="translate(400, 180)">
    <text x="0" y="0" font-family="Arial, Helvetica, sans-serif" font-size="56" font-weight="bold" fill="url(#techGradient)" text-anchor="middle" filter="url(#shadow)">
      STEURER
    </text>
    <text x="0" y="60" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="300" fill="#FFFFFF" text-anchor="middle" letter-spacing="8">
      SYSTEMS
    </text>
  </g>

  <!-- Tagline -->
  <text x="400" y="260" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#94A3B8" text-anchor="middle" letter-spacing="2">
    AUSTRIAN BUILDING INTELLIGENCE PLATFORM
  </text>

  <!-- Austrian Flag Icon (small) -->
  <g transform="translate(680, 340)">
    <rect x="0" y="0" width="90" height="20" fill="#ED2939" rx="2"/>
    <rect x="0" y="20" width="90" height="20" fill="#FFFFFF" rx="2"/>
    <rect x="0" y="40" width="90" height="20" fill="#ED2939" rx="2"/>
  </g>

  <!-- Made in Austria text -->
  <text x="725" y="325" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#64748B" text-anchor="middle" font-weight="600">
    MADE IN AUSTRIA
  </text>

  <!-- Bottom Tech Elements -->
  <g opacity="0.2">
    <line x1="50" y1="380" x2="750" y2="380" stroke="#3B82F6" stroke-width="1"/>
    <circle cx="100" cy="380" r="3" fill="#3B82F6"/>
    <circle cx="250" cy="380" r="3" fill="#3B82F6"/>
    <circle cx="400" cy="380" r="3" fill="#3B82F6"/>
    <circle cx="550" cy="380" r="3" fill="#3B82F6"/>
    <circle cx="700" cy="380" r="3" fill="#3B82F6"/>
  </g>

  <!-- Signature Symbol (bottom left) -->
  <g transform="translate(30, 360)">
    <text font-family="monospace" font-size="14" fill="#475569" font-weight="600">
      ⊘∞⧈∞⊘
    </text>
  </g>
</svg>
