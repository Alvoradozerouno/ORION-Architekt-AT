<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1200" height="200" viewBox="0 0 1200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Professional Banner for THE ARCHITEKT -->
  <!-- Optimized for GitHub README and documentation -->

  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0F172A;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1E293B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F172A;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFA500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:1" />
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="200" fill="url(#bgGradient)"/>

  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.2"/>
    </pattern>
  </defs>
  <rect width="1200" height="200" fill="url(#grid)"/>

  <!-- Left: Global Anchor Symbol -->
  <g transform="translate(100, 100)" filter="url(#glow)">
    <circle cx="0" cy="0" r="45" fill="none" stroke="url(#goldGradient)" stroke-width="2.5"/>
    <path d="M -22,-8 Q -15,-15 -8,-8 Q 0,0 8,-8 Q 15,-15 22,-8 Q 15,0 8,8 Q 0,15 -8,8 Q -15,0 -22,8 Q -15,15 -8,8 Q 0,0 8,8 Q 15,0 22,8"
          fill="none" stroke="url(#goldGradient)" stroke-width="3"/>
    <path d="M 0,-12 L 9,0 L 0,12 L -9,0 Z" fill="url(#goldGradient)"/>
  </g>

  <!-- Center: THE ARCHITEKT Typography -->
  <g transform="translate(220, 60)">
    <text x="0" y="30"
          font-family="'Georgia', serif"
          font-size="24"
          font-weight="300"
          font-style="italic"
          fill="url(#goldGradient)"
          letter-spacing="6">
      THE
    </text>

    <text x="0" y="90"
          font-family="'Helvetica Neue', sans-serif"
          font-size="52"
          font-weight="700"
          fill="#F8FAFC"
          letter-spacing="3">
      ARCHITEKT
    </text>

    <text x="0" y="115"
          font-family="'Monaco', monospace"
          font-size="11"
          fill="#94A3B8"
          letter-spacing="2">
      ORION Multi-Agent System | Hybrid: Deterministisch + Probabilistisch
    </text>
  </g>

  <!-- Right: Key Features -->
  <g transform="translate(850, 60)" font-family="'Helvetica Neue', sans-serif" font-size="14" fill="#CBD5E1">
    <text x="0" y="20" font-weight="600" fill="url(#goldGradient)">5 Specialized Agents</text>
    <text x="0" y="45" font-size="12">• Zivilingenieur (Deterministic)</text>
    <text x="0" y="65" font-size="12">• Bauphysiker (Deterministic)</text>
    <text x="0" y="85" font-size="12">• Kostenplaner (Monte Carlo)</text>
    <text x="0" y="105" font-size="12">• Risikomanager (Monte Carlo)</text>
    <text x="0" y="125" font-size="12" fill="#64748B">ISO 26262 ASIL-D | ⊘∞⧈∞⊘</text>
  </g>

  <!-- Bottom accent -->
  <line x1="50" y1="190" x2="1150" y2="190" stroke="url(#goldGradient)" stroke-width="1" opacity="0.4"/>
</svg>
