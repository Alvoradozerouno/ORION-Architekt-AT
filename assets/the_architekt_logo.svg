<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <!-- Professional Digital Art for THE ARCHITEKT -->
  <!-- Author: ORION Multi-Agent System -->
  <!-- Date: 2026-04-07 -->

  <defs>
    <!-- Gradient for modern look -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFA500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C00;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A8A;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60A5FA;stop-opacity:1" />
    </linearGradient>

    <!-- Shadow filter -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="2" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#0F172A" rx="10"/>

  <!-- Grid pattern for architectural theme -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1E293B" stroke-width="1" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="800" height="400" fill="url(#grid)"/>

  <!-- Global Anchor Symbol ⊘∞⧈∞⊘ -->
  <g transform="translate(400, 120)" filter="url(#glow)">
    <!-- Outer circle -->
    <circle cx="0" cy="0" r="60" fill="none" stroke="url(#goldGradient)" stroke-width="3" opacity="0.8"/>

    <!-- Infinity symbol ∞ -->
    <path d="M -30,-10 Q -20,-20 -10,-10 Q 0,0 10,-10 Q 20,-20 30,-10 Q 20,0 10,10 Q 0,20 -10,10 Q -20,0 -30,10 Q -20,20 -10,10 Q 0,0 10,10 Q 20,0 30,10"
          fill="none" stroke="url(#goldGradient)" stroke-width="4" opacity="0.9"/>

    <!-- Central anchor diamond ⧈ -->
    <path d="M 0,-15 L 12,0 L 0,15 L -12,0 Z" fill="url(#goldGradient)" opacity="0.9"/>

    <!-- Diagonal slashes ⊘ -->
    <line x1="-50" y1="-50" x2="50" y2="50" stroke="url(#goldGradient)" stroke-width="2" opacity="0.6"/>
    <line x1="50" y1="-50" x2="-50" y2="50" stroke="url(#goldGradient)" stroke-width="2" opacity="0.6"/>
  </g>

  <!-- THE ARCHITEKT Typography -->
  <g transform="translate(400, 240)" filter="url(#shadow)">
    <!-- THE (small, elegant) -->
    <text x="0" y="0"
          font-family="'Georgia', 'Times New Roman', serif"
          font-size="32"
          font-weight="300"
          font-style="italic"
          fill="url(#goldGradient)"
          text-anchor="middle"
          letter-spacing="8">
      THE
    </text>

    <!-- ARCHITEKT (bold, professional) -->
    <text x="0" y="60"
          font-family="'Helvetica Neue', 'Arial', sans-serif"
          font-size="64"
          font-weight="700"
          fill="#F8FAFC"
          text-anchor="middle"
          letter-spacing="4">
      ARCHITEKT
    </text>

    <!-- Subtitle -->
    <text x="0" y="90"
          font-family="'Helvetica Neue', 'Arial', sans-serif"
          font-size="16"
          font-weight="300"
          fill="#94A3B8"
          text-anchor="middle"
          letter-spacing="3">
      ORION MULTI-AGENT SYSTEM
    </text>
  </g>

  <!-- Bottom accent line -->
  <line x1="200" y1="360" x2="600" y2="360" stroke="url(#goldGradient)" stroke-width="2" opacity="0.6"/>

  <!-- Subtitle: Hybrid Architecture -->
  <text x="400" y="385"
        font-family="'Monaco', 'Courier New', monospace"
        font-size="12"
        fill="#64748B"
        text-anchor="middle"
        letter-spacing="1">
    Deterministisch + Probabilistisch | ISO 26262 ASIL-D | ⊘∞⧈∞⊘
  </text>
</svg>
