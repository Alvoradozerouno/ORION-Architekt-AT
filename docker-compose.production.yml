# ============================================================================
# ORION Architekt-AT - Production Docker Compose
# ============================================================================
# Complete production stack with all services
# Author: ORION Engineering Team
# Date: 2026-04-11
# Status: PRODUCTION READY
# ============================================================================

services:
  # ==========================================================================
  # PostgreSQL Database
  # ==========================================================================
  postgres:
    image: postgres:15-alpine
    container_name: orion-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-orion_db}
      POSTGRES_USER: ${POSTGRES_USER:-orion}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-orion}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - orion-network

  # ==========================================================================
  # Redis Cache
  # ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: orion-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-} ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - orion-network

  # ==========================================================================
  # ORION API Application
  # ==========================================================================
  api:
    build:
      context: .
      dockerfile: Dockerfile.production
    image: orion-architekt-at:3.0.0
    container_name: orion-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Application
      ENVIRONMENT: production
      DEBUG: "false"
      APP_NAME: "ORION Architekt-AT"
      VERSION: "3.0.0"

      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-orion}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-orion_db}
      DATABASE_POOL_SIZE: 20
      DATABASE_MAX_OVERFLOW: 40

      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0

      # Security
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: 60

      # CORS (update with your domains)
      CORS_ORIGINS: '["https://orion-architekt.at","https://www.orion-architekt.at","https://app.orion-architekt.at"]'

      # Rate Limiting
      RATE_LIMIT_ENABLED: "true"
      RATE_LIMIT_ANONYMOUS: 100
      RATE_LIMIT_AUTHENTICATED: 1000
      RATE_LIMIT_PREMIUM: 10000

      # Monitoring
      ENABLE_METRICS: "true"
      PROMETHEUS_ENABLED: "true"
      SENTRY_DSN: ${SENTRY_DSN:-}

      # File Upload
      MAX_UPLOAD_SIZE_MB: 100
      ALLOWED_EXTENSIONS: "ifc,ifcxml,pdf,dwg,dxf,rvt"
      UPLOAD_FOLDER: /app/uploads

      # Logging
      LOG_LEVEL: INFO
      LOG_FORMAT: json

      # External APIs (optional)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      RIS_API_KEY: ${RIS_API_KEY:-}
      HORA_API_KEY: ${HORA_API_KEY:-}

    volumes:
      - app_uploads:/app/uploads
      - app_logs:/app/logs
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - orion-network

  # ==========================================================================
  # Nginx Reverse Proxy
  # ==========================================================================
  nginx:
    image: nginx:alpine
    container_name: orion-nginx
    restart: unless-stopped
    depends_on:
      - api
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_cache:/var/cache/nginx
    ports:
      - "80:80"
      - "443:443"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - orion-network

  # ==========================================================================
  # Prometheus Monitoring (Optional)
  # ==========================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: orion-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - orion-network
    profiles:
      - monitoring

  # ==========================================================================
  # Grafana Dashboard (Optional)
  # ==========================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: orion-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - orion-network
    profiles:
      - monitoring

# ============================================================================
# Networks
# ============================================================================
networks:
  orion-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16

# ============================================================================
# Volumes
# ============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  app_uploads:
    driver: local
  app_logs:
    driver: local
  nginx_cache:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
