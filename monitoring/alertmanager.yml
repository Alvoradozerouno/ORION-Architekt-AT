# ============================================================================
# ORION Architekt-AT - AlertManager Configuration
# ============================================================================
# Alert routing and notification setup
# Author: ORION Engineering Team
# Date: 2026-04-12
# Status: PRODUCTION MONITORING
# ============================================================================

global:
  resolve_timeout: 5m
  smtp_smarthost: 'smtp.example.com:587'
  smtp_from: 'alerts@orion-architekt.at'
  smtp_auth_username: 'alerts@orion-architekt.at'
  smtp_auth_password: 'CHANGE_ME'

# Alert routing tree
route:
  receiver: 'default'
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h

  # Child routes
  routes:
    # Critical alerts - immediate notification
    - match:
        severity: critical
      receiver: 'pagerduty-critical'
      group_wait: 0s
      repeat_interval: 5m

    # High severity - notify on-call team
    - match:
        severity: high
      receiver: 'oncall-team'
      group_wait: 30s
      repeat_interval: 1h

    # Warning - notify via email
    - match:
        severity: warning
      receiver: 'email-team'
      repeat_interval: 4h

    # Database alerts
    - match:
        service: postgres
      receiver: 'database-team'

    # Security alerts
    - match_re:
        alertname: '(Security|Intrusion|Unauthorized).*'
      receiver: 'security-team'
      group_wait: 0s

# Inhibition rules (suppress certain alerts when others are firing)
inhibit_rules:
  # Suppress warning if critical is firing
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'cluster', 'service']

  # Suppress instance down if entire service is down
  - source_match:
      alertname: 'ServiceDown'
    target_match:
      alertname: 'InstanceDown'
    equal: ['service']

# Receivers (notification destinations)
receivers:
  - name: 'default'
    email_configs:
      - to: 'team@orion-architekt.at'
        headers:
          Subject: '[ORION] Alert: {{ .GroupLabels.alertname }}'

  - name: 'pagerduty-critical'
    pagerduty_configs:
      - service_key: 'CHANGE_ME_PAGERDUTY_KEY'
        description: '{{ .GroupLabels.alertname }}'
        severity: '{{ .CommonLabels.severity }}'
    email_configs:
      - to: 'oncall@orion-architekt.at'
        headers:
          Subject: '[CRITICAL] {{ .GroupLabels.alertname }}'

  - name: 'oncall-team'
    email_configs:
      - to: 'oncall@orion-architekt.at'
        headers:
          Subject: '[HIGH] {{ .GroupLabels.alertname }}'

  - name: 'email-team'
    email_configs:
      - to: 'team@orion-architekt.at'
        headers:
          Subject: '[WARNING] {{ .GroupLabels.alertname }}'

  - name: 'database-team'
    email_configs:
      - to: 'database-team@orion-architekt.at'
        headers:
          Subject: '[DATABASE] {{ .GroupLabels.alertname }}'

  - name: 'security-team'
    email_configs:
      - to: 'security@orion-architekt.at'
        headers:
          Subject: '[SECURITY] {{ .GroupLabels.alertname }}'
          Priority: 'urgent'
