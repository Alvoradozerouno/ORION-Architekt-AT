# ============================================================================
# Grafana Dashboard Provisioning
# ============================================================================
# Automatically load dashboards from files
# ============================================================================

apiVersion: 1

providers:
  - name: 'ORION Dashboards'
    orgId: 1
    folder: 'ORION'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
