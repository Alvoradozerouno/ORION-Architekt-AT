<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORION - Contact</title>
    <style>
        body { font-family: monospace; background: #0a0a0a; color: #00ff88; margin: 0; padding: 2rem; }
        h1 { color: #00ffcc; }
        nav a { color: #00ff88; margin-right: 1rem; text-decoration: none; }
        form { max-width: 600px; margin-top: 2rem; }
        label { display: block; margin-top: 1rem; color: #88aabb; }
        input, textarea {
            width: 100%; padding: 0.5rem; background: #0d1f0d;
            border: 1px solid #1a3a1a; color: #00ff88;
            border-radius: 4px; margin-top: 0.25rem;
        }
        textarea { height: 150px; resize: vertical; }
        button {
            margin-top: 1rem; padding: 0.5rem 2rem;
            background: #00ff88; color: #0a0a0a;
            border: none; border-radius: 4px; cursor: pointer;
            font-weight: bold;
        }
        button:hover { background: #00ffcc; }
    </style>
</head>
<body>
    <h1>✉️ Contact ORION</h1>
    <nav>
        <a href="/world">Home</a>
        <a href="/world/status">Status</a>
        <a href="/world/proofs">Proofs</a>
        <a href="/world/docs">Docs</a>
        <a href="/world/contact">Contact</a>
    </nav>
    <hr style="border-color:#00ff8844">
    <form method="POST" action="/world/contact/submit">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Your name" required>

        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="your@email.com">

        <label for="question">Question / Message</label>
        <textarea id="question" name="question" placeholder="Your question or message..." required></textarea>

        <button type="submit">Send</button>
    </form>
</body>
</html>
